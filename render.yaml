# Render Blueprint Specification for n8n Free Stack (Neon DB)
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: n8n-automation
    env: docker
    plan: free
    dockerfilePath: Dockerfile.n8n
    dockerContext: .
    healthCheckPath: /healthz
    numInstances: 1
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: ep-soft-thunder-aogtrtw6.c-2.ap-southeast-1.aws.neon.tech
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: neondb
      - key: DB_POSTGRESDB_USER
        value: neondb_owner
      - key: DB_POSTGRESDB_PASSWORD
        sync: false # User enters this securely on Render dashboard
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_PORT
        value: 5678
      - key: PORT
        value: 5678
      - key: WEBHOOK_URL
        value: https://n8n-automation-owfh.onrender.com/
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "false"
      - key: PGSSLMODE
        value: require
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"
