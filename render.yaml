# Render Blueprint Specification for n8n Free Stack (Neon DB SSL Fix)
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: n8n-automation
    env: docker
    plan: free # Bypasses credit card check
    dockerfilePath: Dockerfile.n8n
    dockerContext: .
    healthCheckPath: /healthz
    numInstances: 1
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: ep-soft-thunder-aogtrtw6.c-2.ap-southeast-1.aws.neon.tech
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: neondb
      - key: DB_POSTGRESDB_USER
        value: neondb_owner
      - key: DB_POSTGRESDB_PASSWORD
        sync: false # Prompts the user for the password securely on Render (never stored in Git)
      - key: DB_POSTGRESDB_SSL_CA
        value: "/etc/ssl/certs/ca-certificates.crt" # Points to container CA certificates to trigger SSL mode
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false" # Prevents self-signed certificate rejection
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_PORT
        value: 5678
      - key: PORT
        value: 5678
      - key: WEBHOOK_URL
        sync: false # User will input their custom Render service URL here once assigned
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false # User will input their basic auth username
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false # User will input their secure basic auth password
